<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Antigravity SaaS</title>
    <meta name="description" content="Get in touch with the Antigravity team. We're here to help you scale your business with cutting-edge tech solutions.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-mesh: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.1) 0, transparent 50%), 
                       radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0, transparent 50%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            background-image: var(--bg-mesh);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        h1, h2, h3, .font-display {
            font-family: 'Outfit', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }

        /* Subtle Grid Pattern */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            opacity: 0.5;
        }

        /* Custom Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .input-focus-ring {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-focus-ring:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            border-color: var(--primary);
        }

        /* Success State Ripple */
        .success-ripple {
            animation: ripple 0.6s linear;
        }

        @keyframes ripple {
            from { transform: scale(0); opacity: 1; }
            to { transform: scale(4); opacity: 0; }
        }

        /* Loader Animation */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Floating Label Logic */
        .floating-label-group {
            position: relative;
        }

        .floating-label-group label {
            position: absolute;
            top: 50%;
            left: 1rem;
            transform: translateY(-50%);
            transition: all 0.2s ease-out;
            pointer-events: none;
            color: #94a3b8;
        }

        .floating-label-group input:focus ~ label,
        .floating-label-group input:not(:placeholder-shown) ~ label,
        .floating-label-group textarea:focus ~ label,
        .floating-label-group textarea:not(:placeholder-shown) ~ label {
            top: -0.5rem;
            left: 0.8rem;
            font-size: 0.75rem;
            background: white;
            padding: 0 0.4rem;
            color: var(--primary);
            font-weight: 600;
        }

        .floating-label-group textarea ~ label {
            top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <main class="w-full max-w-xl px-6 py-12">
        <div class="glass-card rounded-3xl p-8 md:p-12 animate-fade-up">
            <header class="mb-10 text-center">
                <h1 class="text-4xl font-bold text-slate-900 mb-3 tracking-tight">Let's connect.</h1>
                <p class="text-slate-500 text-lg">Have a question? We'd love to hear from you.</p>
            </header>

            <form id="contactForm" class="space-y-6" novalidate>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Name Field -->
                    <div class="floating-label-group">
                        <input type="text" id="name" name="name" placeholder=" " required
                            class="w-full px-4 py-4 rounded-xl border border-slate-200 bg-white/50 outline-none input-focus-ring text-slate-900">
                        <label for="name">Full Name</label>
                    </div>

                    <!-- Email Field -->
                    <div class="floating-label-group">
                        <input type="email" id="email" name="email" placeholder=" " required
                            class="w-full px-4 py-4 rounded-xl border border-slate-200 bg-white/50 outline-none input-focus-ring text-slate-900">
                        <label for="email">Email Address</label>
                    </div>
                </div>

                <!-- Subject Field -->
                <div class="floating-label-group">
                    <input type="text" id="subject" name="subject" placeholder=" " required
                        class="w-full px-4 py-4 rounded-xl border border-slate-200 bg-white/50 outline-none input-focus-ring text-slate-900">
                    <label for="subject">Subject</label>
                </div>

                <!-- Message Field -->
                <div class="floating-label-group">
                    <textarea id="message" name="message" rows="5" placeholder=" " required
                        class="w-full px-4 py-4 rounded-xl border border-slate-200 bg-white/50 outline-none input-focus-ring text-slate-900 resize-none"></textarea>
                    <label for="message">Message</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="relative w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-indigo-200 flex items-center justify-center overflow-hidden">
                    <span id="btnText">Send Message</span>
                    <div id="btnLoader" class="hidden">
                        <span class="loader"></span>
                        <span>Processing...</span>
                    </div>
                </button>
            </form>

            <!-- Success State -->
            <div id="successState" class="hidden text-center py-10 animate-fade-up">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Message Sent!</h2>
                <p class="text-slate-500 mb-8">We'll get back to you within 24 hours.</p>
                <button onclick="resetForm()" class="text-indigo-600 font-semibold hover:text-indigo-700 transition-colors">
                    Send another message
                </button>
            </div>
        </div>

        <!-- Progress Indicator -->
        <div id="progressContainer" class="hidden mt-8">
            <div class="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden">
                <div id="progressBar" class="bg-indigo-600 h-full w-0 transition-all duration-500 ease-out"></div>
            </div>
            <p id="progressText" class="text-center text-xs text-slate-400 mt-2 font-medium uppercase tracking-widest">Uploading...</p>
        </div>

        <footer class="mt-12 text-center text-slate-400 text-sm">
            &copy; 2026 Antigravity Tech Inc. All rights reserved.
        </footer>
    </main>

    <script>
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const successState = document.getElementById('successState');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Basic Validation Check
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Start Loading State
            setLoading(true);

            // Simulate Progress (since fetch doesn't give upload progress for simple JSON easily)
            simulateProgress();

            try {
                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                // Mock API Call
                const response = await fetch('https://omk33n5qof.execute-api.ap-south-1.amazonaws.com/prod/submit', {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: {
                        'Content-type': 'application/json; charset=UTF-8',
                    },
                });

                if (response.ok) {
                    await new Promise(resolve => setTimeout(resolve, 1000)); // Smooth transition
                    showSuccess();
                } else {
                    throw new Error('Submission failed');
                }
            } catch (error) {
                alert('Something went wrong. Please try again.');
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                btnText.classList.add('hidden');
                btnLoader.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
            } else {
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                progressContainer.classList.add('hidden');
            }
        }

        function simulateProgress() {
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 90) {
                    clearInterval(interval);
                } else {
                    width += Math.random() * 15;
                    if (width > 90) width = 90;
                    progressBar.style.width = width + '%';
                }
            }, 200);
        }

        function showSuccess() {
            progressBar.style.width = '100%';
            progressText.innerText = 'Completed';
            
            setTimeout(() => {
                form.classList.add('hidden');
                progressContainer.classList.add('hidden');
                successState.classList.remove('hidden');
            }, 500);
        }

        function resetForm() {
            form.reset();
            form.classList.remove('hidden');
            successState.classList.add('hidden');
            setLoading(false);
            progressBar.style.width = '0%';
            progressText.innerText = 'Uploading...';
        }

        // Accessibility: Handle Escape key to reset if in success state
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !successState.classList.contains('hidden')) {
                resetForm();
            }
        });
    </script>
</body>
</html>
